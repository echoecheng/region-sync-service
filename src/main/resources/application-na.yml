# ============================================================
# NA 区域部署配置
# 本地启动: java -jar region-sync-service.jar --spring.profiles.active=na --server.port=9091
# ============================================================

server:
  port: ${SERVER_PORT:9091}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/apn_na?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: region-sync-na

region-sync:
  local-region: NA
  remote-region: EU
  target-database: apn_na
  # 消费来自 EU 的 CDC topic（本地单 Kafka 集群直连；生产环境经 MirrorMaker2 镜像）
  topic-prefix: "eu.apn_eu."
