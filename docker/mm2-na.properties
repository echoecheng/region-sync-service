# MirrorMaker 2 config — deployed in NA region
# Mirrors EU CDC topics from kafka-eu to kafka-na
clusters = na-kafka, eu-kafka

na-kafka.bootstrap.servers = kafka-na:29092
eu-kafka.bootstrap.servers = kafka-eu:29092

# EU -> NA: enabled (pull EU data into NA Kafka)
eu-kafka->na-kafka.enabled = true
eu-kafka->na-kafka.topics = eu\.apn_eu\..*

# NA -> EU: disabled (handled by mm2-eu)
na-kafka->eu-kafka.enabled = false

# Keep original topic names (no prefix rewriting)
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

# Replication settings
replication.factor = 1
refresh.topics.interval.seconds = 10
sync.topic.configs.enabled = true
sync.topic.acls.enabled = false

# Heartbeats & checkpoints
emit.heartbeats.enabled = true
emit.heartbeats.interval.seconds = 10
emit.checkpoints.enabled = true
emit.checkpoints.interval.seconds = 30

# Offset sync
offset-syncs.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
checkpoints.topic.replication.factor = 1

# Internal Connect topic replication (single-broker clusters)
config.storage.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1

# Kafka 4.0 dedicated mode requires internal REST for leader election
dedicated.mode.enable.internal.rest = true

# Consumer config
source.cluster.consumer.max.poll.records = 500
source.cluster.consumer.auto.offset.reset = earliest
